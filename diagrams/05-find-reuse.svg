<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf7"/>
      <stop offset="100%" stop-color="#fbf3e6"/>
    </linearGradient>
    <filter id="ss5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <marker id="arr5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c38d1b"/>
    </marker>
  </defs>
  <rect width="980" height="580" fill="url(#bg5)"/>

  <text x="490" y="42" font-size="22" font-weight="700" text-anchor="middle" fill="#222">Anti-Duplication: The find-reuse Gate</text>
  <text x="490" y="66" font-size="13" text-anchor="middle" fill="#666">Two-pass search: text (ripgrep) then structural (ast-grep) — merged and ranked.</text>

  <!-- step 1 -->
  <g filter="url(#ss5)">
    <rect x="20" y="100" width="170" height="130" rx="12" fill="#fff" stroke="#c38d1b" stroke-width="2"/>
    <text x="105" y="128" font-size="13" font-weight="700" text-anchor="middle" fill="#222">1. Intent detected</text>
    <text x="35" y="152" font-size="11" fill="#555">UserPromptSubmit hook</text>
    <text x="35" y="168" font-size="11" fill="#555">flags "add", "create",</text>
    <text x="35" y="184" font-size="11" fill="#555">"implement", "build a"</text>
    <text x="35" y="210" font-size="10" font-style="italic" fill="#888">→ triggers find-reuse</text>
  </g>

  <path d="M190 165 L220 165" stroke="#c38d1b" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- step 2: text pass -->
  <g filter="url(#ss5)">
    <rect x="220" y="100" width="180" height="130" rx="12" fill="#fff" stroke="#c38d1b" stroke-width="2"/>
    <text x="310" y="125" font-size="13" font-weight="700" text-anchor="middle" fill="#222">2. Text pass</text>
    <text x="235" y="148" font-size="11" fill="#555">ripgrep verb+noun</text>
    <text x="235" y="164" font-size="11" fill="#555">pattern across all</text>
    <text x="235" y="180" font-size="11" fill="#555">languages. Records</text>
    <text x="235" y="196" font-size="11" fill="#555">file:line result set.</text>
    <text x="235" y="218" font-size="10" font-family="ui-monospace,Menlo,monospace" fill="#888">rg -i verb.*noun</text>
  </g>

  <path d="M400 165 L430 165" stroke="#c38d1b" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- step 3: structural pass -->
  <g filter="url(#ss5)">
    <rect x="430" y="100" width="185" height="130" rx="12" fill="#fff" stroke="#3aa66b" stroke-width="2"/>
    <text x="522" y="125" font-size="13" font-weight="700" text-anchor="middle" fill="#222">3. Structural pass</text>
    <text x="445" y="148" font-size="11" fill="#555">ast-search skill runs</text>
    <text x="445" y="164" font-size="11" fill="#555">ast-grep patterns for</text>
    <text x="445" y="180" font-size="11" fill="#555">primary languages.</text>
    <text x="445" y="196" font-size="11" fill="#555">Deduplicates vs pass 2.</text>
    <text x="445" y="218" font-size="10" font-family="ui-monospace,Menlo,monospace" fill="#888">ast-grep --pattern</text>
  </g>

  <path d="M615 165 L645 165" stroke="#c38d1b" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- step 4: merge + rank -->
  <g filter="url(#ss5)">
    <rect x="645" y="100" width="170" height="130" rx="12" fill="#fff" stroke="#c38d1b" stroke-width="2"/>
    <text x="730" y="125" font-size="13" font-weight="700" text-anchor="middle" fill="#222">4. Merge + rank</text>
    <text x="660" y="148" font-size="11" fill="#555">Combined results,</text>
    <text x="660" y="164" font-size="11" fill="#555">deduped by file:line.</text>
    <text x="660" y="180" font-size="11" fill="#555">Ranked: domain, lang,</text>
    <text x="660" y="196" font-size="11" fill="#555">test coverage, recency.</text>
    <text x="660" y="218" font-size="10" font-style="italic" fill="#888">top 5 candidates</text>
  </g>

  <path d="M815 165 L855 165" stroke="#c38d1b" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- step 5: decide -->
  <g filter="url(#ss5)">
    <rect x="855" y="100" width="110" height="130" rx="12" fill="#222"/>
    <text x="910" y="128" font-size="13" font-weight="700" text-anchor="middle" fill="white">5. Decide</text>
    <text x="910" y="158" font-size="12" text-anchor="middle" fill="#a8e6a8">reuse</text>
    <text x="910" y="178" font-size="12" text-anchor="middle" fill="#f6c97a">extend</text>
    <text x="910" y="198" font-size="12" text-anchor="middle" fill="#f08585">new</text>
    <text x="910" y="220" font-size="10" text-anchor="middle" fill="#aaa">(justify)</text>
  </g>

  <!-- bottom note -->
  <g filter="url(#ss5)">
    <rect x="20" y="290" width="940" height="260" rx="12" fill="#fff" stroke="#ccc"/>
    <text x="40" y="320" font-size="14" font-weight="700" fill="#222">The rule encoded in the skill</text>
    <text x="40" y="350" font-size="12" fill="#444">When Claude proposes a new function, helper, or module, it must first list:</text>
    <text x="60" y="375" font-size="12" fill="#444">— up to 5 existing candidates that solve the same or adjacent problem (found by text + structural search),</text>
    <text x="60" y="394" font-size="12" fill="#444">— for each: why it's not suitable (specific, not vibes),</text>
    <text x="60" y="413" font-size="12" fill="#444">— or a concrete plan to extend/refactor the closest match instead.</text>
    <text x="40" y="443" font-size="12" fill="#444">The structural pass (ast-grep) catches what text search misses: renamed variables, different import styles,</text>
    <text x="40" y="462" font-size="12" fill="#444">and usage patterns expressed differently across languages.</text>
    <text x="40" y="492" font-size="11" fill="#888" font-style="italic">ast_search_tool is detected by detect-stack.sh and stored in .claude/stack.json. If null, only the text pass runs.</text>
    <text x="40" y="510" font-size="11" fill="#888" font-style="italic">Install: brew install ast-grep  |  then re-run /forge.detect-stack</text>
    <text x="40" y="530" font-size="11" fill="#888" font-style="italic">Source: ast-grep.github.io  |  Pattern syntax: .claude/skills/ast-search/references/pattern-syntax.md</text>
  </g>
</svg>
