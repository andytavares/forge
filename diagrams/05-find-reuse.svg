<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf7"/>
      <stop offset="100%" stop-color="#fbf3e6"/>
    </linearGradient>
    <filter id="ss5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <marker id="arr5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c38d1b"/>
    </marker>
  </defs>
  <rect width="980" height="540" fill="url(#bg5)"/>

  <text x="490" y="42" font-size="22" font-weight="700" text-anchor="middle" fill="#222">Anti-Duplication: The find-reuse Gate</text>
  <text x="490" y="66" font-size="13" text-anchor="middle" fill="#666">Before any new function or module, the harness forces a reuse check.</text>

  <!-- step 1 -->
  <g filter="url(#ss5)">
    <rect x="40" y="110" width="220" height="120" rx="12" fill="#fff" stroke="#c38d1b" stroke-width="2"/>
    <text x="150" y="140" font-size="14" font-weight="700" text-anchor="middle" fill="#222">1. Intent detected</text>
    <text x="60" y="166" font-size="12" fill="#555">UserPromptSubmit hook flags</text>
    <text x="60" y="184" font-size="12" fill="#555">phrases like "add", "implement",</text>
    <text x="60" y="202" font-size="12" fill="#555">"create", "build a"</text>
    <text x="60" y="220" font-size="11" font-style="italic" fill="#888">→ triggers the reuse skill</text>
  </g>

  <path d="M260 170 L300 170" stroke="#c38d1b" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- step 2 -->
  <g filter="url(#ss5)">
    <rect x="300" y="110" width="220" height="120" rx="12" fill="#fff" stroke="#c38d1b" stroke-width="2"/>
    <text x="410" y="140" font-size="14" font-weight="700" text-anchor="middle" fill="#222">2. Grep + AST sweep</text>
    <text x="320" y="166" font-size="12" fill="#555">Searches for similar function</text>
    <text x="320" y="184" font-size="12" fill="#555">names, types, comments</text>
    <text x="320" y="202" font-size="12" fill="#555">across all languages in the</text>
    <text x="320" y="220" font-size="12" fill="#555">monorepo</text>
  </g>

  <path d="M520 170 L560 170" stroke="#c38d1b" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- step 3 -->
  <g filter="url(#ss5)">
    <rect x="560" y="110" width="220" height="120" rx="12" fill="#fff" stroke="#c38d1b" stroke-width="2"/>
    <text x="670" y="140" font-size="14" font-weight="700" text-anchor="middle" fill="#222">3. Candidates ranked</text>
    <text x="580" y="166" font-size="12" fill="#555">Top N candidates returned</text>
    <text x="580" y="184" font-size="12" fill="#555">with file path, signature,</text>
    <text x="580" y="202" font-size="12" fill="#555">test coverage, last-modified</text>
    <text x="580" y="220" font-size="12" fill="#555">date</text>
  </g>

  <path d="M780 170 L820 170" stroke="#c38d1b" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- step 4 -->
  <g filter="url(#ss5)">
    <rect x="820" y="110" width="120" height="120" rx="12" fill="#222"/>
    <text x="880" y="140" font-size="14" font-weight="700" text-anchor="middle" fill="white">4. Decide</text>
    <text x="880" y="170" font-size="12" text-anchor="middle" fill="#a8e6a8">reuse</text>
    <text x="880" y="190" font-size="12" text-anchor="middle" fill="#f6c97a">extend</text>
    <text x="880" y="210" font-size="12" text-anchor="middle" fill="#f08585">new (justify)</text>
  </g>

  <!-- bottom note -->
  <g filter="url(#ss5)">
    <rect x="40" y="290" width="900" height="220" rx="12" fill="#fff" stroke="#ccc"/>
    <text x="60" y="320" font-size="14" font-weight="700" fill="#222">The rule encoded in the skill</text>
    <text x="60" y="350" font-size="12" fill="#444">When Claude proposes a new function, helper, or module, it must first list:</text>
    <text x="80" y="375" font-size="12" fill="#444">— up to 5 existing candidates that solve the same or adjacent problem,</text>
    <text x="80" y="394" font-size="12" fill="#444">— for each: why it's not suitable (specific, not vibes),</text>
    <text x="80" y="413" font-size="12" fill="#444">— or a concrete plan to extend/refactor the closest match instead.</text>
    <text x="60" y="445" font-size="12" fill="#444">If Claude cannot justify net-new code with this list, the implementer subagent refuses to proceed.</text>
    <text x="60" y="470" font-size="12" fill="#444">Net result: fewer parallel implementations, less drift, less debt — without slowing one-shots that</text>
    <text x="60" y="488" font-size="12" fill="#444">genuinely don't have a prior art match.</text>
  </g>
</svg>
