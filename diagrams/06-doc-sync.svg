<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf7"/>
      <stop offset="100%" stop-color="#e7f0e7"/>
    </linearGradient>
    <filter id="ss6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <marker id="arr6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e8a57"/>
    </marker>
  </defs>
  <rect width="980" height="520" fill="url(#bg6)"/>

  <text x="490" y="42" font-size="22" font-weight="700" text-anchor="middle" fill="#222">Markdown Doc Sync: Three Triggers</text>
  <text x="490" y="66" font-size="13" text-anchor="middle" fill="#666">Indexed once, consulted always, kept fresh by hooks and a scheduled subagent.</text>

  <!-- index -->
  <g filter="url(#ss6)">
    <rect x="60" y="110" width="280" height="350" rx="12" fill="#fff" stroke="#2e8a57" stroke-width="2"/>
    <text x="200" y="140" font-size="14" font-weight="700" text-anchor="middle" fill="#222">.claude/doc-index.json</text>
    <text x="80" y="170" font-size="12" fill="#444">One row per markdown file:</text>
    <text x="100" y="192" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#555">path</text>
    <text x="100" y="210" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#555">title</text>
    <text x="100" y="228" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#555">summary</text>
    <text x="100" y="246" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#555">owners</text>
    <text x="100" y="264" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#555">referenced_code_paths</text>
    <text x="100" y="282" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#555">last_verified_commit</text>
    <text x="100" y="300" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#555">staleness_score</text>
    <text x="80" y="332" font-size="12" fill="#444">Cheap to grep, easy for Claude to</text>
    <text x="80" y="350" font-size="12" fill="#444">read on demand.</text>
    <text x="80" y="382" font-size="11" font-style="italic" fill="#888">Built by the doc-keeper subagent;</text>
    <text x="80" y="400" font-size="11" font-style="italic" fill="#888">checked into git.</text>
    <text x="80" y="432" font-size="11" fill="#aaa">Source of truth for what docs exist</text>
    <text x="80" y="448" font-size="11" fill="#aaa">and which are stale.</text>
  </g>

  <!-- Right side: three triggers -->
  <g filter="url(#ss6)">
    <rect x="400" y="110" width="540" height="100" rx="12" fill="#fff" stroke="#2e8a57" stroke-width="2"/>
    <text x="420" y="138" font-size="14" font-weight="700" fill="#222">Trigger 1 — PostToolUse on Edit/Write of a code file</text>
    <text x="420" y="162" font-size="12" fill="#555">Hook computes which docs reference the changed path, marks them</text>
    <text x="420" y="182" font-size="12" fill="#555">stale, and queues a doc-keeper run.</text>
  </g>

  <path d="M340 160 L400 160" stroke="#2e8a57" stroke-width="2" marker-end="url(#arr6)"/>

  <g filter="url(#ss6)">
    <rect x="400" y="230" width="540" height="100" rx="12" fill="#fff" stroke="#2e8a57" stroke-width="2"/>
    <text x="420" y="258" font-size="14" font-weight="700" fill="#222">Trigger 2 — PostToolUse on Edit/Write of a markdown file</text>
    <text x="420" y="282" font-size="12" fill="#555">Re-summarize the file, re-extract referenced code paths, bump</text>
    <text x="420" y="302" font-size="12" fill="#555">last_verified_commit if changes look superficial.</text>
  </g>

  <path d="M340 280 L400 280" stroke="#2e8a57" stroke-width="2" marker-end="url(#arr6)"/>

  <g filter="url(#ss6)">
    <rect x="400" y="350" width="540" height="100" rx="12" fill="#fff" stroke="#2e8a57" stroke-width="2"/>
    <text x="420" y="378" font-size="14" font-weight="700" fill="#222">Trigger 3 — /docs-sync slash command (or scheduled)</text>
    <text x="420" y="402" font-size="12" fill="#555">Full sweep. doc-keeper subagent verifies every stale entry against</text>
    <text x="420" y="422" font-size="12" fill="#555">current code, opens edits with citations to the source.</text>
  </g>

  <path d="M340 400 L400 400" stroke="#2e8a57" stroke-width="2" marker-end="url(#arr6)"/>
</svg>
